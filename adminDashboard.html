<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/adminDashboard.css">
</head>

<body>
  <!-- HEADER / NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <img src="images/logo.png" alt="GHSS Kubarhat">
      <span>Admin Panel</span>
    </div>

    <ul class="nav-links">
      <li><a href="#" id="logoutBtn">Logout</a></li>
    </ul>

    <div class="menu-toggle" id="menuToggle">&#9776;</div>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    <section class="dashboard-cards">
      <div class="card">
        <h2>Contact Form Submissions</h2>
        <button onclick="openSheet('contact')">Open Sheet</button>
      </div>

      <div class="card">
        <h2>Admission Form Submissions</h2>
        <button onclick="openSheet('admission')">Open Sheet</button>
      </div>
    </section>
  </main>

  <script src="scripts/adminDashboard.js"></script>
</body>
</html>
